[project]
name = "cortex-graph-sdk"
version = "0.1.0"
description = "Cortex graph SDK: node/edge models and the GraphRepository port + implementations."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.6", "cortex-contracts"]

[project.optional-dependencies]
neo4j = ["neo4j>=5.20"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
