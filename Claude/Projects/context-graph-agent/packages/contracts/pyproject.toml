[project]
name = "cortex-contracts"
version = "0.1.0"
description = "Cortex shared wire contracts: event envelope, payload schemas, enums, topic catalog."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.6"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
