name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # --- correctness: unit + integration + e2e tests -------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install workspace
        run: pip install -e ".[dev,api,github]"
      - name: Tests (unit + integration + e2e)
        run: pytest -q
      # Lint/format/type are advisory until a repo-wide formatting pass lands; they run so
      # regressions are visible but do not fail the build on pre-existing style debt.
      - name: Lint (ruff)
        continue-on-error: true
        run: ruff check .
      - name: Format check (ruff)
        continue-on-error: true
        run: ruff format --check .
      - name: Type check (mypy)
        continue-on-error: true
        run: mypy

  # --- every service image builds and boots (memory runtime, no external infra) --
  # Proves each service is independently deployable: build its own Dockerfile, run the
  # container, and assert its HTTP surface (health/ready/metrics/openapi) responds.
  build-and-smoke:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - {service: ingestion, port: 8001}
          - {service: entity, port: 8002}
          - {service: graph, port: 8003}
          - {service: retrieval, port: 8004}
          - {service: ranking, port: 8005}
          - {service: llm, port: 8006}
          - {service: notification, port: 8007}
          - {service: api, port: 8000}
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}-service image
        run: >-
          docker build -f services/${{ matrix.service }}-service/Dockerfile
          -t cortex/${{ matrix.service }}-service:ci .
      - name: Run container (memory runtime)
        run: >-
          docker run -d --name svc -e CORTEX_RUNTIME=memory
          -p ${{ matrix.port }}:${{ matrix.port }} cortex/${{ matrix.service }}-service:ci
      - name: Assert HTTP surface responds
        run: |
          set -e
          for i in $(seq 1 40); do
            if curl -fsS "http://localhost:${{ matrix.port }}/health" >/dev/null 2>&1; then break; fi
            if [ "$i" = 40 ]; then echo "::error::health never came up"; docker logs svc; exit 1; fi
            sleep 3
          done
          curl -fsS "http://localhost:${{ matrix.port }}/health"
          curl -fsS "http://localhost:${{ matrix.port }}/metrics" | grep -q '# TYPE'
          curl -fsS "http://localhost:${{ matrix.port }}/openapi.json" >/dev/null
          echo "${{ matrix.service }}-service container OK"
      - name: Dump logs on failure
        if: failure()
        run: docker logs svc || true
      - name: Cleanup
        if: always()
        run: docker rm -f svc || true

  # --- full stack via docker compose (kafka runtime end-to-end) ------------------
  # Brings up the production-shaped stack (Kafka/Neo4j/Qdrant/Redis + all eight services),
  # waits for health, scrapes metrics, seeds the synthetic scenario, and asserts the API
  # gateway returns ranked risks. Runs but is non-blocking until the kafka-runtime adapters
  # (Neo4j graph, Qdrant retrieval) are fully wired in Phases 4-5; flip continue-on-error
  # to false then to make it a required gate.
  compose-smoke:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    env:
      COMPOSE: docker compose -f infra/compose/docker-compose.yml
    steps:
      - uses: actions/checkout@v4
      - name: Build and start the stack (dashboard excluded via profile)
        run: >-
          $COMPOSE up -d --build
          kafka neo4j qdrant redis
          api-service ingestion-service entity-service graph-service
          retrieval-service ranking-service llm-service notification-service
      - name: Wait for every service to report healthy
        run: |
          set -e
          services="api-service:8000 ingestion-service:8001 entity-service:8002 graph-service:8003 retrieval-service:8004 ranking-service:8005 llm-service:8006 notification-service:8007"
          for pair in $services; do
            name=${pair%%:*}; port=${pair##*:}
            echo "waiting for $name on :$port"
            ok=0
            for i in $(seq 1 60); do
              if curl -fsS "http://localhost:$port/health" >/dev/null 2>&1; then ok=1; echo "$name healthy"; break; fi
              sleep 5
            done
            if [ "$ok" != 1 ]; then echo "::error::$name never became healthy"; $COMPOSE logs "$name"; exit 1; fi
          done
      - name: Scrape /metrics on every service
        run: |
          set -e
          for port in 8000 8001 8002 8003 8004 8005 8006 8007; do
            curl -fsS "http://localhost:$port/metrics" | grep -q '# TYPE' && echo ":$port metrics ok"
          done
      - name: Seed the synthetic scenario
        run: $COMPOSE exec -T api-service python -m cortex.tools.demo
      - name: Assert the API gateway returns ranked risks
        run: |
          set -e
          curl -fsS -H "x-org-id: org_demo" "http://localhost:8000/api/v1/risk/top" -o risk.json
          python3 -c "import json; d=json.load(open('risk.json')); assert d['data'], 'no risks returned'; print('top risks:', len(d['data']))"
      - name: Dump logs on failure
        if: failure()
        run: $COMPOSE logs
      - name: Tear down
        if: always()
        run: $COMPOSE down -v
