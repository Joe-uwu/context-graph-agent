# Full local stack: backing infrastructure + every service + the dashboard.
# The in-memory runtime needs none of this (use `cortex-demo`); this brings up the
# production-shaped kafka runtime. See docs/deployment.md.
#
#   docker compose -f infra/compose/docker-compose.yml up
#
# Each pipeline service builds from its own Dockerfile (services/<svc>/Dockerfile) so it
# is independently deployable; they share environment + dependency wiring via the
# x-service-env / x-service-deps anchors below.

name: cortex

x-service-env: &service-env
  CORTEX_RUNTIME: kafka
  CORTEX_KAFKA_BOOTSTRAP: kafka:9092
  CORTEX_NEO4J_URI: bolt://neo4j:7687
  CORTEX_NEO4J_PASSWORD: password
  CORTEX_QDRANT_URL: http://qdrant:6333
  CORTEX_REDIS_URL: redis://redis:6379/0
  CORTEX_OTEL_ENDPOINT: http://otel-collector:4317

x-service-deps: &service-deps
  # Services wait only for the backends to be *started*, not *healthy*. The Kafka producer
  # connects lazily and the consumer loop tolerates a not-yet-ready broker (it polls and
  # continues), and graph-backed services retry the Bolt connection themselves
  # (build_graph_repo -> _wait_for_neo4j). So no service crash-loops during backend warmup,
  # and none is blocked by a healthcheck's timing.
  kafka: {condition: service_started}
  neo4j: {condition: service_started}
  qdrant: {condition: service_started}
  redis: {condition: service_started}

services:
  # --- infrastructure ---
  # Official Apache Kafka image in KRaft (no ZooKeeper) single-node combined mode.
  # (The old bitnami/kafka:3.7 tag was removed from Docker Hub in Bitnami's 2025 image
  # migration, which is why `manifest unknown` appeared.)
  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    ports: ["9092:9092"]

  neo4j:
    image: neo4j:5.20
    # No APOC plugin: the adapter uses only core Cypher, and skipping the plugin download
    # makes start-up faster and removes a network dependency.
    environment:
      NEO4J_AUTH: neo4j/password
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    ports: ["7474:7474", "7687:7687"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cortex
    ports: ["5432:5432"]

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes: ["../monitoring/otel/otel-collector.yaml:/etc/otel/config.yaml:ro"]
    ports: ["4317:4317"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - "../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "../monitoring/prometheus/alerts:/etc/prometheus/alerts:ro"
    ports: ["9090:9090"]
    depends_on: [api-service]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - "../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro"
      - "../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro"
    ports: ["3001:3000"]
    depends_on: [prometheus]

  # --- pipeline services (each its own deployable image) ---
  # Liveness is enforced by the HEALTHCHECK baked into each service Dockerfile.
  ingestion-service:
    build: {context: ../.., dockerfile: services/ingestion-service/Dockerfile}
    environment:
      <<: *service-env
      CORTEX_HTTP_PORT: "8001"
    depends_on: {<<: *service-deps}
    restart: unless-stopped
    ports: ["8001:8001"]

  entity-service:
    build: {context: ../.., dockerfile: services/entity-service/Dockerfile}
    environment:
      <<: *service-env
      CORTEX_HTTP_PORT: "8002"
    depends_on: {<<: *service-deps}
    restart: unless-stopped
    ports: ["8002:8002"]

  graph-service:
    build: {context: ../.., dockerfile: services/graph-service/Dockerfile}
    environment:
      <<: *service-env
      CORTEX_HTTP_PORT: "8003"
    depends_on: {<<: *service-deps}
    restart: unless-stopped
    ports: ["8003:8003"]

  retrieval-service:
    build: {context: ../.., dockerfile: services/retrieval-service/Dockerfile}
    environment:
      <<: *service-env
      CORTEX_HTTP_PORT: "8004"
    depends_on: {<<: *service-deps}
    restart: unless-stopped
    ports: ["8004:8004"]

  ranking-service:
    build: {context: ../.., dockerfile: services/ranking-service/Dockerfile}
    environment:
      <<: *service-env
      CORTEX_HTTP_PORT: "8005"
    depends_on: {<<: *service-deps}
    restart: unless-stopped
    ports: ["8005:8005"]

  llm-service:
    build: {context: ../.., dockerfile: services/llm-service/Dockerfile}
    environment:
      <<: *service-env
      CORTEX_HTTP_PORT: "8006"
    depends_on: {<<: *service-deps}
    restart: unless-stopped
    ports: ["8006:8006"]

  notification-service:
    build: {context: ../.., dockerfile: services/notification-service/Dockerfile}
    environment:
      <<: *service-env
      CORTEX_HTTP_PORT: "8007"
    depends_on: {<<: *service-deps}
    restart: unless-stopped
    ports: ["8007:8007"]

  api-service:
    build: {context: ../.., dockerfile: services/api-service/Dockerfile}
    environment:
      <<: *service-env
      CORTEX_HTTP_PORT: "8000"
    depends_on: {<<: *service-deps}
    restart: unless-stopped
    ports: ["8000:8000"]

  # Static single-file SPA served by nginx; talks to api-service over REST from the browser.
  # (compose-smoke starts an explicit service list that excludes this, so it never blocks CI.)
  dashboard:
    build:
      context: ../../apps/dashboard
    ports: ["3000:3000"]
    depends_on: [api-service]
