# Prometheus scrape configuration for the Cortex stack.
# Services expose /metrics; kafka-exporter exposes consumer lag; the OTel collector exposes
# trace-derived service-graph metrics (via its prometheus exporter).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: cortex-local

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cortex-services
    metrics_path: /metrics
    static_configs:
      - targets: ["api-service:8000"]
        labels: {service: api-service}
      - targets: ["ingestion-service:8001"]
        labels: {service: ingestion-service}
      - targets: ["entity-service:8002"]
        labels: {service: entity-service}
      - targets: ["graph-service:8003"]
        labels: {service: graph-service}
      - targets: ["retrieval-service:8004"]
        labels: {service: retrieval-service}
      - targets: ["ranking-service:8005"]
        labels: {service: ranking-service}
      - targets: ["llm-service:8006"]
        labels: {service: llm-service}
      - targets: ["notification-service:8007"]
        labels: {service: notification-service}

  # Kafka consumer lag (danielqsj/kafka-exporter).
  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # Trace-derived service-graph + span metrics from the OTel collector's prometheus exporter.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # The collector's own internal telemetry.
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]
